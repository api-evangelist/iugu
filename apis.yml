aid: iugu
name: Iugu
description: >
  Iugu is a Brazilian payment infrastructure platform offering REST APIs for
  invoicing, subscriptions, payment splits, boleto bancário generation, credit
  card processing, and marketplace payments. The platform enables businesses to
  automate financial operations including recurring billing, split payments for
  marketplaces, Pix instant payments, and sub-account management. Iugu operates
  as a Bacen-licensed Payment Institution and is PCI DSS compliant, serving
  e-commerce, SaaS, and marketplace companies across Brazil.
